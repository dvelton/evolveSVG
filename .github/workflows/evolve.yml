name: Evolve

on:
  schedule:
    - cron: '0 0,2,4,6,8,10,12,14,16,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run evolution
        run: python src/evolve.py

      - name: Read evolution result
        id: result
        run: |
          if [ -f output/history.json ]; then
            GEN=$(python3 -c "import json; h=json.load(open('output/history.json')); print(h['generation'])")
            ENTRY=$(python3 -c "
          import json
          h = json.load(open('output/history.json'))
          e = h['entries'][-1]
          print(f\"{e['mutation_type']} fitness {e['fitness']:.2f}\")
          ")
            echo "gen=$GEN" >> "$GITHUB_OUTPUT"
            echo "entry=$ENTRY" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "gen ${{ steps.result.outputs.gen }}: ${{ steps.result.outputs.entry }}"
            git push
          fi
